<!DOCTYPE html>
<html>
<head>
<title>Rajath Shenoy</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    margin: 0;
    background-color: #141414;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
}

h1 {
    margin-top: 80px;
    font-size: 40px;
}

.profiles {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 50px;
}

.profile {
    margin: 20px;
    text-decoration: none;
    color: white;
}

.profile-box {
    width: 160px;
    height: 160px;
    background-color: #222;
    border-radius: 10px;
    transition: 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
}

.profile-box:hover {
    transform: scale(1.1);
    background-color: #e50914;
}

img.corner {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 60px;
    border-radius: 50%;
    border: 2px solid #e50914;
}
</style>
</head>
<body>

<h1>Select What You Want To Explore</h1>

<div class="profiles">
    <a href="experience.html" class="profile">
        <div class="profile-box">Experience</div>
    </a>

    <a href="projects.html" class="profile">
        <div class="profile-box">Projects</div>
    </a>

    <a href="skills.html" class="profile">
        <div class="profile-box">Skills</div>
    </a>

    <a href="education.html" class="profile">
        <div class="profile-box">Education</div>
    </a>

    <a href="references.html" class="profile">
        <div class="profile-box">References</div>
    </a>
</div>

<img src="profile.jpg" class="corner">

</body>
</html>
